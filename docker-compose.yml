services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: steam-playtime-server
    env_file:
      - ./server/.env
    environment:
      PORT: 3000
      DB_PATH: /app/data/steam-playtime.sqlite
      SYNC_ALL_ENABLED: "true"
      SYNC_ALL_CRON: "0 * * * *"
      SYNC_ALL_TIMEZONE: "UTC"
      SYNC_ALL_TIMEOUT_SECONDS: "120"
    volumes:
      - steam-playtime-data:/app/data
    ports:
      - "3100:3000"
    restart: unless-stopped
    networks:
      - nginx

  sqlite-web:
    image: ghcr.io/coleifer/sqlite-web:latest
    container_name: steam-playtime-sqlite-web
    command: ["/data/steam-playtime.sqlite", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - steam-playtime-data:/data:ro
    ports:
      - "3102:8080"
    restart: unless-stopped
    networks:
      - nginx
    depends_on:
      - server

networks:
  nginx:
    external: true

volumes:
  steam-playtime-data:

